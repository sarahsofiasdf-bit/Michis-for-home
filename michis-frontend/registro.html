  <h1 class="text-center page-title-simple">Crear cuenta</h1>

  <main class="container">
    <div class="form-card">
      <img class="form-card__logo" src="images/logo.png" alt="Logo Michis for Home" />
      <h2 class="form-card__title text-center">Registrarse</h2>

      <div class="form-card__inner">
        <form id="form-registro">
          <div class="form-group">
            <label for="registro-nombre">Nombre completo</label>
            <input type="text" id="registro-nombre" name="nombre" required />
          </div>

          <div class="form-group">
            <label for="registro-correo">Correo</label>
            <input type="email" id="registro-correo" name="correo" required />
          </div>

          <div class="form-group">
            <label for="registro-telefono">Teléfono</label>
            <input type="tel" id="registro-telefono" name="telefono" required />
          </div>

          <div class="form-group">
            <label for="registro-password">Contraseña</label>
            <input type="password" id="registro-password" name="password" required />
          </div>

          <div class="form-group">
            <label for="registro-confirm-password">Confirmar contraseña</label>
            <input type="password" id="registro-confirm-password" name="confirmPassword" required />
          </div>

          <div class="text-center">
            <button type="submit" class="btn">Registrarse</button>
          </div>

          <p class="form-card__footnote">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
          </p>
        </form>
      </div>
    </div>

  </main>
