  <h1 class="text-center page-title-simple">Dar en adopción</h1>

  <main class="container">
    <p class="text-center dar-adopcion__intro">
      ¿Tienes un gatito que necesita un nuevo hogar? Cuéntanos sobre él y lo
      ayudaremos a encontrar una familia que lo ame.
    </p>

    <div class="form-card">
      <img class="form-card__logo" src="images/logo.png" alt="Logo Michis for Home" />

      <div class="form-card__inner">
        <form id="form-dar-adopcion">
          <div class="form-group">
            <label for="dar-nombre-gato">Nombre del gatito</label>
            <input type="text" id="dar-nombre-gato" name="nombreGato" required />
          </div>

          <div class="form-group">
            <label for="dar-edad-gato">Edad</label>
            <input type="text" id="dar-edad-gato" name="edadGato" placeholder="Ej: 2 añitos, 5 mesesitos" required />
          </div>

          <div class="form-group">
            <label for="dar-descripcion-gato">Descripción</label>
            <textarea id="dar-descripcion-gato" name="descripcionGato"></textarea>
          </div>

          <div class="form-group">
            <label for="dar-personalidad-gato">Personalidad</label>
            <textarea id="dar-personalidad-gato" name="personalidadGato"></textarea>
          </div>

          <div class="form-group">
            <label for="dar-vacunas-gato">Vacunas</label>
            <input type="text" id="dar-vacunas-gato" name="vacunasGato" placeholder="Ej: Al día" />
          </div>

          <div class="form-group">
            <label for="dar-salud-gato">Estado de salud</label>
            <textarea id="dar-salud-gato" name="saludGato"></textarea>
          </div>

          <div class="form-group">
            <label for="dar-foto-gato">Foto del gatito</label>
            <input type="file" id="dar-foto-gato" name="fotoGato" accept="image/*" />
          </div>

          <div class="text-center">
            <button type="submit" class="btn">Enviar información</button>
          </div>
        </form>
      </div>
    </div>
  </main>
